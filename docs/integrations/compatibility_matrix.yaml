# Matrice de compatibilité inter-librairies
# Mise à jour par le Release Manager lors de chaque validation d'intégration.
#
# Mécanisme d'intégration retenu : git-ref directe (pas de TestPyPI RC).
# Le consommateur installe la branche version/ via :
#   uv add "baobab-auth-security @ git+https://github.com/baobabgit/baobab-auth-security.git@version/vX.Y.Z"
# puis exécute sa suite de tests. Résultat consigné ici + rapport dans reports/.

library: baobab-auth-security
version: v0.1.0
integration_ref: version/v0.1.0

# Consommateurs de cette librairie (API, client, admin, service...).
validated_consumers:
  - order: 1
    name: baobab-auth-api
    contract: api
    version: v0.1.0
    status: PASSED
    required: true
    integration_method: pypi
    ref: "baobab-auth-security>=0.1.1,<0.2.0"
    validated_at: "2026-07-01"
    validation_type:
      - import_tests
      - contract_tests
      - integration_tests
    report: docs/integrations/reports/baobab-auth-security-v0.1.1__baobab-auth-api-v0.1.0.md
    validated_features:
      - CorePasswordHasherAdapter
      - CoreTokenProviderAdapter
      - LocalJwksProvider
      - JWT RS256
      - access and refresh tokens
    notes: >
      Login, refresh, JWKS local ; dépend de database v0.1.1 + security v0.1.1 (PyPI).
      Rapport consommateur : baobab-auth-api
      docs/integrations/reports/baobab-auth-security-v0.1.1__baobab-auth-api-v0.1.0.md

# Dépendances de cette librairie (briques dont elle dépend).
validated_dependencies:
  - name: baobab-auth-core
    version: v0.5.1
    constraint: ">=0.4.0,<1.0.0"
    status: PASSED
    integration_method: pypi
    validation_type:
      - import_tests
      - contract_tests
      - integration_tests
    report: docs/integrations/reports/baobab-auth-core-v0.5.1__baobab-auth-security-v0.1.0.md
